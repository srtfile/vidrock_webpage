<!DOCTYPE html>
<html>
<head><title>Vidrock</title></head>
<body>
<input id="tmdb" placeholder="TMDB ID" value="99861">
<select id="type"><option value="movie">Movie</option><option value="tv">TV</option></select>
<input id="season" placeholder="Season" style="width:60px">
<input id="episode" placeholder="Episode" style="width:60px">
<button onclick="getStreams()">Get Streams</button>
<pre id="out"></pre>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script>
const KEY = CryptoJS.enc.Utf8.parse("x7k9mPqT2rWvY8zA5bC3nF6hJ2lK4mN9");
const IV  = CryptoJS.enc.Utf8.parse("x7k9mPqT2rWvY8zA");

// PUT YOUR WORKER URL HERE
const WORKER = "https://vidrock.narutoanimeinspirationquote.workers.dev/";

function makeToken(tmdbId, type, season, episode) {
  const plain = type === "tv" ? `${tmdbId}_${season}_${episode}` : String(tmdbId);
  const enc = CryptoJS.AES.encrypt(plain, KEY, { iv: IV, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 });
  return enc.ciphertext.toString(CryptoJS.enc.Base64)
    .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}

async function getStreams() {
  const tmdb    = document.getElementById("tmdb").value.trim();
  const type    = document.getElementById("type").value;
  const season  = document.getElementById("season").value || 1;
  const episode = document.getElementById("episode").value || 1;
  const out     = document.getElementById("out");

  const token    = makeToken(tmdb, type, season, episode);
  const apiUrl   = `https://vidrock.ru/api/${type}/${token}`;
  const embedUrl = `https://vidrock.ru/embed/${type}/${tmdb}`;

  out.textContent = "Fetching...";

  try {
    const r = await fetch(`${WORKER}?url=${encodeURIComponent(apiUrl)}&ref=${encodeURIComponent(embedUrl)}`);
    const data = await r.json();
    const lines = [];
    for (const [name, info] of Object.entries(data)) {
      if (info?.url) lines.push(`${name}: ${info.url}`);
    }
    out.textContent = lines.join("\n") || "No streams found";
  } catch(e) {
    out.textContent = "Error: " + e.message;
  }
}
</script>
</body>
</html>
